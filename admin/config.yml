backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "artworks"
    label: "Obras"

    files:
      - label: "Galería"
        name: "gallery"
        file: "data/artworks.json"

        fields:
          - label: "Obras"
            name: "items"
            widget: "list"

            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Imagen", name: "image", widget: "image" }
              - label: "Categoría"
                name: "category"
                widget: "select"
                options:
                  - { label: "Arte", value: "arte" }
                  - { label: "Tatuajes", value: "tatuajes" }
                  - { label: "Diseños", value: "disenos" }
                  - { label: "Artesanías", value: "artesanias" }
                default: "arte"